<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 转 PNG — Easy Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --border: #e8e8e5;
      --text: #1a1a18;
      --text-secondary: #6b6b66;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --success: #16a34a;
      --success-light: #f0fdf4;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 18px 24px;
      gap: 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .85rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }

    .page-title { font-size: .85rem; color: var(--text-secondary); }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .hero { margin-bottom: 32px; }
    .hero h1 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .hero p {
      margin-top: 8px;
      font-size: .9rem;
      color: var(--text-secondary);
    }

    .privacy-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 5px 12px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 99px;
      font-size: .78rem;
      font-weight: 500;
    }

    .settings {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .setting-item { display: flex; align-items: center; gap: 10px; }
    .setting-item label {
      font-size: .85rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .setting-item select, .setting-item input[type=number] {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .88rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    .setting-item select:focus,
    .setting-item input[type=number]:focus { border-color: var(--accent); }

    /* Drop zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      box-shadow: var(--shadow);
      position: relative;
    }
    .dropzone.dragover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .dropzone-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 14px;
      color: var(--text-secondary);
    }
    .dropzone h3 { font-size: 1rem; font-weight: 500; margin-bottom: 6px; }
    .dropzone p { font-size: .85rem; color: var(--text-secondary); }
    .dropzone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* Progress section */
    .progress-section {
      margin-top: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: none;
    }
    .progress-section.visible { display: block; }

    .progress-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .progress-label { font-size: .875rem; font-weight: 500; }
    .progress-count { font-size: .8rem; color: var(--text-secondary); }

    .progress-bar-wrap {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .4s ease;
    }
    .progress-bar.done { background: var(--success); }

    /* Preview grid */
    .preview-grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .preview-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: contain;
      background: #f3f3f0;
      display: block;
    }

    .preview-card-footer {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .preview-page-num {
      font-size: .75rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .preview-dl-btn {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: background .15s;
    }
    .preview-dl-btn:hover { background: #dbeafe; }

    /* Actions */
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: .875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .9; }
    .btn-ghost {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: #ccc; }
    .btn-download-all {
      background: var(--success-light);
      color: var(--success);
      border: 1px solid #bbf7d0;
    }
    .btn-download-all:hover:not(:disabled) { background: #dcfce7; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      返回
    </a>
    <span class="page-title">Easy Tools</span>
  </div>

  <div class="container">
    <div class="hero">
      <h1>PDF 转 PNG</h1>
      <p>将 PDF 每一页转换为高清 PNG 图片，支持自定义分辨率</p>
      <div class="privacy-badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        文件仅在浏览器本地处理，不上传服务器
      </div>
    </div>

    <div class="settings">
      <div class="setting-item">
        <label>缩放倍数</label>
        <input type="number" id="scaleInput" value="2" min="1" max="4" step="0.5" style="width:80px;" />
        <span style="font-size:.82rem;color:var(--text-secondary);">×（越大越清晰）</span>
      </div>
    </div>

    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept=".pdf,application/pdf" />
      <div class="dropzone-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <h3>拖拽 PDF 到此处，或点击选择</h3>
      <p>仅支持 PDF 格式，每次转换一个文件</p>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-info">
        <span class="progress-label" id="progressLabel">正在转换...</span>
        <span class="progress-count" id="progressCount">0 / 0</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>

    <div class="preview-grid" id="previewGrid"></div>

    <div class="actions" id="actions" style="display:none;">
      <button class="btn btn-download-all" id="downloadAllBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        全部下载
      </button>
      <button class="btn btn-ghost" id="clearBtn">重新选择</button>
    </div>
  </div>

  <script type="module">
    // Use PDF.js from CDN
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const progressSection = document.getElementById('progressSection');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    const progressCount = document.getElementById('progressCount');
    const previewGrid = document.getElementById('previewGrid');
    const actions = document.getElementById('actions');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const scaleInput = document.getElementById('scaleInput');

    let pageBlobs = []; // { blob, pageNum, filename }
    let currentPdfName = '';

    // Drag & Drop
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file?.type === 'application/pdf') processFile(file);
    });
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) processFile(file);
      fileInput.value = '';
    });

    async function processFile(file) {
      pageBlobs = [];
      previewGrid.innerHTML = '';
      actions.style.display = 'none';
      currentPdfName = file.name.replace(/\.pdf$/i, '');

      progressSection.classList.add('visible');
      progressBar.style.width = '0%';
      progressBar.className = 'progress-bar';
      progressLabel.textContent = '正在加载 PDF...';
      progressCount.textContent = '';

      const scale = parseFloat(scaleInput.value) || 2;

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const total = pdf.numPages;

        progressLabel.textContent = `正在转换（共 ${total} 页）`;
        progressCount.textContent = `0 / ${total}`;

        for (let i = 1; i <= total; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale });

          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');

          await page.render({ canvasContext: ctx, viewport }).promise;

          const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
          const dataUrl = canvas.toDataURL('image/png');

          const filename = `${currentPdfName}_page_${String(i).padStart(3, '0')}.png`;
          pageBlobs.push({ blob, pageNum: i, filename });

          // Append preview card
          const card = document.createElement('div');
          card.className = 'preview-card';
          card.innerHTML = `
            <img src="${dataUrl}" alt="第 ${i} 页" loading="lazy" />
            <div class="preview-card-footer">
              <span class="preview-page-num">第 ${i} 页</span>
              <button class="preview-dl-btn" data-idx="${pageBlobs.length - 1}">下载</button>
            </div>
          `;
          previewGrid.appendChild(card);

          // Attach handler
          card.querySelector('.preview-dl-btn').addEventListener('click', () => {
            const idx = parseInt(card.querySelector('.preview-dl-btn').dataset.idx);
            downloadSingle(idx);
          });

          const pct = Math.round((i / total) * 100);
          progressBar.style.width = pct + '%';
          progressCount.textContent = `${i} / ${total}`;
        }

        progressBar.classList.add('done');
        progressBar.style.width = '100%';
        progressLabel.textContent = `转换完成，共 ${total} 页`;
        actions.style.display = 'flex';

      } catch (err) {
        console.error(err);
        progressLabel.textContent = '转换失败，请检查文件是否为有效的 PDF';
        progressBar.style.background = '#dc2626';
      }
    }

    function downloadSingle(idx) {
      const item = pageBlobs[idx];
      if (!item) return;
      triggerDownload(item.blob, item.filename);
    }

    async function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    downloadAllBtn.addEventListener('click', async () => {
      for (const item of pageBlobs) {
        await triggerDownload(item.blob, item.filename);
        await new Promise(r => setTimeout(r, 80));
      }
    });

    clearBtn.addEventListener('click', () => {
      pageBlobs = [];
      previewGrid.innerHTML = '';
      progressSection.classList.remove('visible');
      actions.style.display = 'none';
    });
  </script>
</body>
</html>
