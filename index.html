<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --border: #e8e8e5;
      --text: #1a1a18;
      --text-secondary: #6b6b66;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 48px 24px 0;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    header p {
      margin-top: 10px;
      font-size: .95rem;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .privacy-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      padding: 6px 14px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 99px;
      font-size: .8rem;
      font-weight: 500;
    }

    .privacy-badge svg { flex-shrink: 0; }

    main {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 48px auto;
      padding: 0 24px 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.07);
      border-color: #d4d4ce;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card p {
      font-size: .875rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .card-arrow {
      margin-top: auto;
      padding-top: 12px;
      font-size: .8rem;
      font-weight: 500;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: .8rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <header>
    <h1>Easy Tools</h1>
    <p>轻量、快速的日常小工具</p>
    <div class="privacy-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      所有处理在浏览器本地完成，文件不会上传到任何服务器
    </div>
  </header>

  <main>
    <div class="grid">

      <a href="compress/" class="card">
        <div class="card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/><path d="M9 1v4M15 1v4M9 19v4M15 19v4M1 9h4M1 15h4M19 9h4M19 15h4"/>
          </svg>
        </div>
        <h2>图片压缩</h2>
        <p>将图片压缩到指定大小，支持 PNG、JPG、WEBP 等格式，保持最佳画质。</p>
        <div class="card-arrow">
          前往使用
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

      <a href="pdf2png/" class="card">
        <div class="card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><polyline points="10,9 9,9 8,9"/>
          </svg>
        </div>
        <h2>PDF 转 PNG</h2>
        <p>将 PDF 文件逐页转换为高清 PNG 图片，支持批量下载打包。</p>
        <div class="card-arrow">
          前往使用
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

    </div>
  </main>

  <footer>
    <a href="https://github.com/AnXinrui/easy-tools" style="color:inherit;text-decoration:none;">GitHub</a>
  </footer>
</body>
</html>
